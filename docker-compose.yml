version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=7379
      - REDIS_URL=redis://redis:6379
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_MODEL=${LLM_MODEL:-qwen-max}
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      - qdrant
      - falkordb
      - redis
    networks:
      - engineering-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - engineering-net
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:v2.1.0
    ports:
      - "7379:7379"
      - "6380:6380"
    volumes:
      - falkordb-data:/data
    networks:
      - engineering-net
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - engineering-net
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  engineering-net:
    driver: bridge

volumes:
  qdrant-storage:
  falkordb-data:
  redis-data: