apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: my-service
  namespace: default
spec:
  hosts:
    - my-service.example.com
  gateways:
    - my-gateway
  http:
    - match:
        - headers:
            x-premium:
              exact: "true"
      route:
        - destination:
            host: my-service
            subset: premium
      retries:
        attempts: 3
        perTryTimeout: 2s
    - route:
        - destination:
            host: my-service
            subset: default
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: my-destination
  namespace: default
spec:
  host: my-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
  subsets:
    - name: default
      labels:
        version: v1
    - name: premium
      labels:
        version: v2
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: my-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.example.com"
      tls:
        mode: SIMPLE
        credentialName: my-cert
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - my-service.example.com
      tls:
        mode: MUTUAL
        credentialName: my-cert
---
apiVersion: networking.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: my-authz-policy
  namespace: default
spec:
  selector:
    matchLabels:
      app: my-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/my-service-sa"
    - to:
        - operation:
            methods:
              - GET
              - POST
            paths:
              - /api/v1/*
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-service
  namespace: default
spec:
  hosts:
    - external-api.example.com
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS