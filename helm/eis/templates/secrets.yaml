apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eis.fullname" . }}-secrets
  labels:
    {{- include "eis.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret }}
  CREDENTIAL_ENCRYPT_KEY: {{ .Values.secrets.credentialEncryptKey }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey }}